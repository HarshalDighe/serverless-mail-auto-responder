<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mail Analytics Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- =========================
         HEADER
    ========================== -->
    <header class="dashboard-header">
        <h1>📊 Mail Processing Analytics</h1>

        <div class="header-right">
            <span id="apiStatus" class="status-badge offline">
                API: Checking...
            </span>

            <button onclick="toggleTheme()" class="theme-btn">
                🌙 Theme
            </button>

            <button onclick="toggleAutoRefresh()" class="refresh-btn">
                Auto Refresh: OFF
            </button>

            <button onclick="logout()" class="logout-btn">
                Logout
            </button>
        </div>
    </header>


    <!-- =========================
         KPI SECTION
    ========================== -->
    <section class="kpi-container">

        <div class="card">
            <h3>Today</h3>
            <span id="today">0</span>
        </div>

        <div class="card processed">
            <h3>Auto Replied</h3>
            <span id="autoReplied">0</span>
        </div>

        <div class="card failed">
            <h3>No Auto Reply</h3>
            <span id="notAutoReplied">0</span>
        </div>

        <div class="card">
            <h3>Success Rate</h3>
            <span id="successRate">0%</span>
        </div>

    </section>


    <!-- =========================
         CHART SECTION
    ========================== -->
    <section class="charts">

        <div class="chart-box">
            <h3>📈 Daily Email Trend</h3>
            <canvas id="lineChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>🔎 Keyword Distribution</h3>
            <canvas id="pieChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>📬 Processed vs Failed</h3>
            <canvas id="barChart"></canvas>
        </div>

    </section>


    <!-- =========================
         DYNAMODB TABLE SECTION
    ========================== -->
    <section class="activity-section">

        <h3>📋 DynamoDB Full Records</h3>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Transaction ID</th>
                        <th>Email ID</th>
                        <th>Sender</th>
                        <th>Keyword</th>
                        <th>Status</th>
                        <th>Auto Reply</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="activityTable">
                    <!-- Dynamic rows inserted by script.js -->
                </tbody>
            </table>
        </div>

    </section>


    <!-- Scripts -->
    <script src="script.js"></script>

</body>
</html>
